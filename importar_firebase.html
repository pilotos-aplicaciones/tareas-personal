<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Importar Tareas a Firebase</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
  h1 { font-size: 20px; color: #333; }
  .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .step { font-size: 13px; color: #666; margin-bottom: 8px; }
  .btn { background: #5A4F8A; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 8px; }
  .btn:hover { background: #4a3f7a; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn-google { background: #fff; color: #333; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-google:hover { background: #f5f5f5; }
  .log { background: #1e1e1e; color: #aef; border-radius: 8px; padding: 14px; font-size: 12px; font-family: monospace; min-height: 120px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
  .ok { color: #6f6; }
  .err { color: #f66; }
  .warn { color: #fa0; }
  input[type=file] { font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .badge-rvc { background: #ede9fc; color: #5A4F8A; }
  .badge-personal { background: #e1f5ee; color: #0F6E56; }
  .uid-box { background: #f0f0f0; border-radius: 6px; padding: 8px 10px; font-size: 11px; font-family: monospace; color: #444; margin-top: 8px; word-break: break-all; display: none; }
</style>
</head>
<body>

<h1>🔥 Importar Tareas a Firebase</h1>

<div class="card">
  <div class="step">Paso 1 — Inicia sesión con tu cuenta Google</div>
  <button class="btn btn-google" id="btn-login" onclick="loginGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Iniciar sesión con Google
  </button>
  <div id="user-info" style="font-size:13px;color:#555;margin-top:8px;display:none"></div>
  <div class="uid-box" id="uid-box"></div>
</div>

<div class="card">
  <div class="step">Paso 2 — Selecciona los archivos JSON</div>
  <div style="margin-bottom:10px">
    <label style="font-size:13px;font-weight:600">Tareas RVC <span class="badge badge-rvc">RVC</span></label><br>
    <input type="file" id="file-rvc" accept=".json" style="margin-top:4px">
  </div>
  <div>
    <label style="font-size:13px;font-weight:600">Tareas Personal <span class="badge badge-personal">Personal</span></label><br>
    <input type="file" id="file-personal" accept=".json" style="margin-top:4px">
  </div>
</div>

<div class="card">
  <div class="step">Paso 3 — Importar todo a Firebase</div>
  <button class="btn" id="btn-import" onclick="importar()" disabled>🔥 Importar a Firebase</button>
</div>

<div class="card">
  <div class="step">Log de importación</div>
  <div class="log" id="log">Esperando...</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, collection, writeBatch } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCmUlkihNfxV8CyHOZ-38gcEx27jqU0z04",
  authDomain: "rvc-pilotos-app.firebaseapp.com",
  projectId: "rvc-pilotos-app",
  storageBucket: "rvc-pilotos-app.firebasestorage.app",
  messagingSenderId: "304566913753",
  appId: "1:304566913753:web:f1936de8ca85188338ccc8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUid = null;

function log(msg, type='') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = type;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

window.loginGoogle = async function() {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    currentUid = user.uid;
    document.getElementById('user-info').style.display = 'block';
    document.getElementById('user-info').textContent = '✓ Conectado como ' + user.email;
    document.getElementById('uid-box').style.display = 'block';
    document.getElementById('uid-box').textContent = 'UID: ' + user.uid;
    document.getElementById('btn-login').textContent = '✓ Sesión iniciada';
    document.getElementById('btn-login').disabled = true;
    document.getElementById('btn-import').disabled = false;
    log('✓ Sesión iniciada como ' + user.email, 'ok');
    log('  UID: ' + user.uid, 'ok');
    log('  Ruta en Firestore: usuarios/' + user.uid + '/listas/', 'ok');
  } catch(e) {
    log('✗ Error de login: ' + e.message, 'err');
  }
};

async function leerJSON(inputId) {
  return new Promise((resolve, reject) => {
    const file = document.getElementById(inputId).files[0];
    if (!file) { resolve(null); return; }
    const reader = new FileReader();
    reader.onload = e => {
      try { resolve(JSON.parse(e.target.result)); }
      catch(err) { reject('JSON inválido en ' + inputId); }
    };
    reader.readAsText(file);
  });
}

async function importarLista(uid, listaId, listaNombre, listaColor, driveFile, data) {
  if (!data) { log(`⚠ Sin archivo para ${listaNombre}, omitiendo`, 'warn'); return; }

  log(`\n── Importando lista: ${listaNombre} ──`);
  const basePath = ['usuarios', uid, 'listas', listaId];

  // 1. Info de la lista
  await setDoc(doc(db, ...basePath), {
    id: listaId,
    nombre: listaNombre,
    color: listaColor,
    driveFile: driveFile,
    creadoEn: new Date().toISOString()
  });
  log(`✓ Info de lista guardada`, 'ok');

  // 2. Config: grupoOrder, sgrupoOrder y filtros por lista
  await setDoc(doc(db, ...basePath, 'config', 'general'), {
    grupoOrder: data.grupoOrder || [],
    sgrupoOrder: data.sgrupoOrder || {},
    filtros: {
      responsable: '',
      estado: '',
      prioridad: '',
      inicio: '',
      starred: false
    },
    priorOrder: [],
    actualizadoEn: new Date().toISOString()
  });
  log(`✓ Configuración, filtros y orden de priorizadas guardados`, 'ok');

  // 3. Personas
  const personas = data.personas || [];
  if (personas.length > 0) {
    const batch = writeBatch(db);
    personas.forEach(p => {
      const nombre = typeof p === 'string' ? p : (p.nombre || p);
      if (nombre) {
        const ref = doc(collection(db, ...basePath, 'personas'));
        batch.set(ref, { nombre, creadoEn: new Date().toISOString() });
      }
    });
    await batch.commit();
    log(`✓ ${personas.length} persona(s) importada(s)`, 'ok');
  } else {
    log(`  Sin personas`, 'warn');
  }

  // 4. Tareas en batches de 400
  const tasks = data.tasks || [];
  log(`  Importando ${tasks.length} tareas...`);
  const BATCH_SIZE = 400;
  let count = 0;
  for (let i = 0; i < tasks.length; i += BATCH_SIZE) {
    const batch = writeBatch(db);
    const chunk = tasks.slice(i, i + BATCH_SIZE);
    chunk.forEach(t => {
      const ref = doc(db, ...basePath, 'tasks', t.id);
      batch.set(ref, {
        id: t.id,
        titulo: t.titulo || '',
        grupo: t.grupo || null,
        subgrupo: t.subgrupo || null,
        responsable: t.responsable || null,
        inicio: t.inicio || null,
        limite: t.limite || null,
        prioridad: t.prioridad || 'Media',
        estado: t.estado || 'Pendiente',
        notas: t.notas || null,
        subtareas: t.subtareas || [],
        starred: t.starred || false,
        creado: t.creado || new Date().toISOString().split('T')[0],
        actualizadoEn: new Date().toISOString()
      });
      count++;
    });
    await batch.commit();
    log(`  ✓ ${Math.min(i + BATCH_SIZE, tasks.length)}/${tasks.length} tareas subidas`, 'ok');
  }
  log(`✓ Lista ${listaNombre} completada (${count} tareas)`, 'ok');
}

window.importar = async function() {
  const user = auth.currentUser;
  if (!user) { log('✗ Debes iniciar sesión primero', 'err'); return; }

  document.getElementById('btn-import').disabled = true;
  clearLog();
  log('🔥 Iniciando importación...');
  log('  Ruta: usuarios/' + user.uid + '/listas/');

  try {
    const dataRVC = await leerJSON('file-rvc');
    const dataPersonal = await leerJSON('file-personal');

    if (!dataRVC && !dataPersonal) {
      log('✗ Debes seleccionar al menos un archivo JSON', 'err');
      document.getElementById('btn-import').disabled = false;
      return;
    }

    await importarLista(user.uid, 'rvc',      'RVC',      '#9B8FD4', 'tareasRVC.json',      dataRVC);
    await importarLista(user.uid, 'personal', 'Personal', '#2DC88A', 'tareasPersonal.json', dataPersonal);

    log('\n══════════════════════════════', 'ok');
    log('✅ Importación completada exitosamente', 'ok');
    log('Puedes cerrar esta página y abrir la app.', 'ok');

  } catch(e) {
    log('✗ Error: ' + (e.message || e), 'err');
    document.getElementById('btn-import').disabled = false;
  }
};
</script>
</body>
</html>
